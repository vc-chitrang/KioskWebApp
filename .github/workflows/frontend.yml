name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      # Pull project settings + env vars (does NOT build)
      - name: Pull Vercel environment
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Build the app ourselves — avoids "spawn sh ENOENT" from vercel build
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      # Convert dist/ into the .vercel/output format that --prebuilt expects
      - name: Prepare Vercel output structure
        working-directory: frontend
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          echo '{"version":3}' > .vercel/output/config.json

      # Deploy the pre-built output — no build step runs on Vercel side
      - name: Deploy to Vercel
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
