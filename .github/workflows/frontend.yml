name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      # Download project settings + production env vars to repo root .vercel/
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Copy Vercel's production env vars into frontend/ so Vite can read them at build time
      - name: Inject env vars into frontend
        run: |
          if [ -f .vercel/.env.production.local ]; then
            cp .vercel/.env.production.local frontend/.env.production.local
            echo "Env vars injected:"
            grep "^VITE_" frontend/.env.production.local || echo "(no VITE_ vars found — check Vercel dashboard)"
          else
            echo "WARNING: .vercel/.env.production.local not found"
          fi

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Vite will now read VITE_API_URL from frontend/.env.production.local
      - name: Build
        working-directory: frontend
        run: npm run build

      # Package dist/ into the .vercel/output format for --prebuilt deploy
      - name: Prepare Vercel output structure
        run: |
          mkdir -p .vercel/output/static
          cp -r frontend/dist/. .vercel/output/static/
          echo '{"version":3}' > .vercel/output/config.json

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
